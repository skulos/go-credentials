name: Lint

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 📦 Cache tools
        uses: actions/cache@v4
        with:
          path: bin
          key: ${{ runner.os }}-tools-${{ hashFiles('scripts/*.sh') }}

      - name: 🔧 Make scripts executable
        run: chmod +x scripts/*.sh

      - name: 📦 Install dependencies (via scripts)
        run: ./scripts/install_golangci_lint.sh

      - name: 🧹 Run lint
        run: ./scripts/lint.sh